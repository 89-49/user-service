error:
  configs:
    MethodArgumentNotValidException:
      code: "U001"
      message: "입력한 회원정보가 유효하지 않습니다."
      status: 400

    UnauthorizedException:
      code: "U002"
      message: "인증되지 않은 사용자입니다."
      status: 401

    AdminAccessDeniedException:
      code: "U003"
      message: "해당 리소스에 접근할 관리자 권한이 없습니다."
      status: 403

    UnauthorizedRoleAssignmentException:
      code: "U004"
      message: "관리자를 등록할 권한이 없습니다."
      status: 403

    UserNotFoundException:
      code: "U005"
      message: "해당 회원을 찾을 수 없습니다."
      status: 404

    DuplicateUsernameException:
      code: "U006"
      message: "이미 등록된 회원입니다."
      status: 409
