name: Deploy User Service

on:
  push:
    branches: [ main, dev ]
  workflow_dispatch:
    inputs:
      force_apply_retention_policy:
        description: "AR retention policy 적용"
        type: boolean
        default: false

env:
  GCP_PROJECT: ${{ vars.GCP_PROJECT_ID }}
  AR_IMAGE_PATH: ${{ vars.AR_IMAGE_PATH }}
  WORK_DIR: /opt/user-service
  HEALTH_RETRIES: 30
  HEALTH_INTERVAL: 10

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      actions: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve image metadata
        id: meta
        run: |
          echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          REGISTRY_HOST=$(echo "$AR_IMAGE_PATH" | cut -d/ -f1)
          echo "registry_host=${REGISTRY_HOST}" >> "$GITHUB_OUTPUT"

      - name: Apply AR Image Retention Policy
        if: |
          contains(toJSON(github.event.commits.*.modified), 'deploy/ar-image-retention-policy.json') ||
          contains(toJSON(github.event.commits.*.added), 'deploy/ar-image-retention-policy.json') ||
          (github.event_name == 'workflow_dispatch' && inputs.force_apply_retention_policy)
        run: |
          REPO_NAME=$(echo "$AR_IMAGE_PATH" | cut -d/ -f3)
          POLICY_FILE="deploy/ar-image-retention-policy.json"

          if [ ! -f "$POLICY_FILE" ]; then
            echo "Error: $POLICY_FILE not found"
            exit 1
          fi

          REGION=$(echo "$AR_IMAGE_PATH" | sed 's/-docker\.pkg\.dev.*//')
          gcloud artifacts repositories set-cleanup-policies "$REPO_NAME" \
            --project="$GCP_PROJECT" \
            --location="${REGION}" \
            --policy="$POLICY_FILE" \
            --quiet
          echo "Successfully synced retention policy from $POLICY_FILE"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.meta.outputs.registry_host }}
          username: 'oauth2accesstoken'
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.AR_IMAGE_PATH }}:${{ steps.meta.outputs.tag }}
            ${{ env.AR_IMAGE_PATH }}:latest
          secrets: |
            GPR_USER=${{ secrets.GPR_USER }}
            GPR_TOKEN=${{ secrets.GPR_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [ build-and-push ]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include:
          - vm: user-service-1
            zone: ${{ vars.GCP_ZONE }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      # TERMINATED 상태이면 이후 모든 step 스킵
      - name: Check VM status
        id: vm-status
        run: |
          STATUS=$(gcloud compute instances describe ${{ matrix.vm }} \
            --zone="${{ matrix.zone }}" \
            --project="$GCP_PROJECT" \
            --format="value(status)" 2>/dev/null || echo "NOT_FOUND")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "${{ matrix.vm }} → $STATUS"

      - name: Resolve rollback target
        id: rollback
        if: steps.vm-status.outputs.status == 'RUNNING'
        run: |
          STABLE=$(gcloud artifacts docker tags list "$AR_IMAGE_PATH" \
            --project="$GCP_PROJECT" \
            --filter="tag=stable" \
            --format="value(tag)" 2>/dev/null | head -n1)

          if [ -n "$STABLE" ]; then
            echo "tag=stable" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "No stable tag yet — first deploy. Rollback will be skipped."
          fi

      - name: Sync compose file to ${{ matrix.vm }}
        if: steps.vm-status.outputs.status == 'RUNNING'
        run: |
          gcloud compute scp deploy/docker-compose.prod.yaml \
            ${{ matrix.vm }}:/tmp/docker-compose.prod.yaml \
            --zone="${{ matrix.zone }}" \
            --project="$GCP_PROJECT" \
            --tunnel-through-iap

      - name: Deploy and verify on ${{ matrix.vm }}
        id: deploy_run
        if: steps.vm-status.outputs.status == 'RUNNING'
        env:
          NEW_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          AR_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          REGISTRY_HOST=$(echo "$AR_IMAGE_PATH" | cut -d/ -f1)

          gcloud compute ssh ${{ matrix.vm }} \
            --zone="${{ matrix.zone }}" \
            --project="$GCP_PROJECT" \
            --tunnel-through-iap \
            --command="
              set -e

              echo '$AR_TOKEN' | sudo docker login -u oauth2accesstoken --password-stdin https://$REGISTRY_HOST

              sudo mkdir -p $WORK_DIR
              sudo mv /tmp/docker-compose.prod.yaml $WORK_DIR/docker-compose.prod.yaml
              cd $WORK_DIR
          
              test -f .env || { echo '.env not found in $WORK_DIR'; exit 1; }
          
              if ! sudo docker network inspect pgsg-network > /dev/null 2>&1; then
                echo 'pgsg-network not found. Creating...'
                sudo docker network create pgsg-network
                echo 'pgsg-network created.'
              fi
          
              if ! sudo -E docker compose -f docker-compose.prod.yaml config > /dev/null 2>&1; then
                echo 'Error: docker-compose.prod.yaml validation failed. Check the compose file.'
                exit 1
              fi

              export IMAGE_TAG='$NEW_TAG'
              export AR_IMAGE_PATH='${{ env.AR_IMAGE_PATH }}'

              sudo env IMAGE_TAG=\"$NEW_TAG\" AR_IMAGE_PATH=\"${{ env.AR_IMAGE_PATH }}\" docker compose -f docker-compose.prod.yaml pull
              sudo env IMAGE_TAG=\"$NEW_TAG\" AR_IMAGE_PATH=\"${{ env.AR_IMAGE_PATH }}\" docker compose -f docker-compose.prod.yaml up -d

              echo 'Checking actuator health (max $HEALTH_RETRIES x ${HEALTH_INTERVAL}s)...'
              HEALTHY=0
              for i in \$(seq 1 $HEALTH_RETRIES); do
                if curl -sf http://localhost:8081/actuator/health \
                    | grep -q '\"status\":\"UP\"'; then
                  echo \"Actuator UP (attempt \$i)\"
                  HEALTHY=1
                  break
                fi
                echo \"Waiting for service... (\$i/$HEALTH_RETRIES)\"
                sleep $HEALTH_INTERVAL
              done

              if [ \"\$HEALTHY\" != '1' ]; then
                echo 'Actuator health check failed.'
                exit 1
              fi
            "

      - name: Rollback ${{ matrix.vm }}
        if: failure() && steps.deploy_run.conclusion == 'failure' && steps.rollback.outputs.tag != ''
        env:
          ROLLBACK_TAG: ${{ steps.rollback.outputs.tag }}
          AR_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          set +e
          REGISTRY_HOST=$(echo "$AR_IMAGE_PATH" | cut -d/ -f1)

          attempt_rollback() {
            gcloud compute ssh ${{ matrix.vm }} \
              --zone="${{ matrix.zone }}" \
              --project="$GCP_PROJECT" \
              --tunnel-through-iap \
              --command="
                set -e

                echo '$AR_TOKEN' | sudo docker login -u oauth2accesstoken --password-stdin https://$REGISTRY_HOST

                cd $WORK_DIR

                sudo docker compose -f docker-compose.prod.yaml down --remove-orphans -t 5 || true

                export IMAGE_TAG='$ROLLBACK_TAG'
                export AR_IMAGE_PATH='${{ env.AR_IMAGE_PATH }}'

                sudo env IMAGE_TAG=\"$ROLLBACK_TAG\" AR_IMAGE_PATH=\"${{ env.AR_IMAGE_PATH }}\" docker compose -f docker-compose.prod.yaml pull
                sudo env IMAGE_TAG=\"$ROLLBACK_TAG\" AR_IMAGE_PATH=\"${{ env.AR_IMAGE_PATH }}\" docker compose -f docker-compose.prod.yaml up -d

                for i in \$(seq 1 18); do
                  if curl -sf http://localhost:8081/actuator/health \
                      | grep -q '\"status\":\"UP\"'; then
                    echo \"Rollback container UP (attempt \$i)\"
                    exit 0
                  fi
                  sleep 10
                done

                echo 'Rollback container did not become healthy.'
                exit 1
              "
          }

          for attempt in 1 2 3; do
            echo "::group::Rollback attempt $attempt/3 on ${{ matrix.vm }}"
            attempt_rollback
            RC=$?
            echo "::endgroup::"

            if [ $RC -eq 0 ]; then
              echo "Rollback succeeded on attempt $attempt."
              exit 0
            fi

            echo "Rollback attempt $attempt failed (exit=$RC)."
            if [ $attempt -lt 3 ]; then
              echo "Retrying in 15 seconds..."
              sleep 15
            fi
          done

          echo "::error::All rollback attempts failed on ${{ matrix.vm }}. Manual intervention required."
          exit 1

  promote-stable:
    needs: [ build-and-push, deploy ]
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') &&
      needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Promote new SHA to :stable tag
        run: |
          NEW_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          echo "Promoting ${AR_IMAGE_PATH}:${NEW_TAG} -> ${AR_IMAGE_PATH}:stable"
          gcloud artifacts docker tags add \
            "${AR_IMAGE_PATH}:${NEW_TAG}" \
            "${AR_IMAGE_PATH}:stable" \
            --quiet
          echo "Stable tag updated."