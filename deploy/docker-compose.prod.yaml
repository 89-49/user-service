services:
  user-service:
    container_name: user-service
    image: ${AR_IMAGE_PATH}:${IMAGE_TAG}
    restart: always
    ports:
      - "8081:8081"
    env_file:
      - .env
    volumes:
      - /opt/user-service/ssl:/app/ssl
    networks:
      - pgsg-network

  promtail:
    image: grafana/promtail:2.9.1
    container_name: promtail
    restart: always
    volumes:
      - /opt/user-service/promtail-config.yml:/etc/promtail/config.yml
      - /opt/user-service/logs:/logs
    command: -config.file=/etc/promtail/config.yml
    networks:
      - pgsg-network

networks:
  pgsg-network:
    external: true
